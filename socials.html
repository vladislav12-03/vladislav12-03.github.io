<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Redirecting…</title>
    <meta http-equiv="refresh" content="0;url=/socials">
    <link rel="canonical" href="/socials">
    <script>
        // Дополнительный JS-редирект на случай, если meta не сработает
        (function () {
            var target = '/socials';
            if (window.location && window.location.replace) {
                window.location.replace(target);
            } else {
                window.location.href = target;
            }
        })();
    </script>
</head>
<body>
    <p>Redirecting to <a href="/socials">/socials</a>…</p>
</body>
</html>
